name: CI/CD Pipeline - Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Deploy via SSH
      uses: appleboy/scp-action@master
      with:
        host: premium304.web-hosting.com
        username: abduksto
        key: ${{ secrets.CPANEL_DEPLOY_SECRET }}
        port: 21098
        source: "dist/*"
        target: "/home/abduksto/socialmelo.com/"
        strip_components: 1
        rm: true