name: CI/CD Pipeline - Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Dependencies
      run: npm ci
    
    - name: Build Project
      run: npm run build
      env:
        CI: false
    
    - name: 📂 Deploy to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: premium304.web-hosting.com
        username: abduksto
        password: ${{ secrets.CPANEL_DEPLOY_SECRET }}
        local-dir: ./dist/
        server-dir: /home/abduksto/socialmelo.com/
        dangerous-clean-slate: true