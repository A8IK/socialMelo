name: CI/CD Pipeline - Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install Dependencies
      run: npm ci
    
    - name: Build Project
      run: npm run build
      env:
        CI: false
    
    - name: Deploy via SSH
      uses: appleboy/scp-action@master
      with:
        host: premium304.web-hosting.com
        username: abduksto
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 21098
        source: "dist/*"
        target: "/home/abduksto/socialmelo.com/"
        strip_components: 1
        rm: true