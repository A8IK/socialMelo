name: CI/CD Pipeline - Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Dependencies
      run: npm ci
    
    - name: Build Project
      run: npm run build
      env:
        CI: false
    
    - name: Verify Build
      run: |
        echo "Build completed. Contents:"
        ls -la dist/
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.CPANEL_DEPLOY_SECRET }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 21098 premium304.web-hosting.com >> ~/.ssh/known_hosts
    
    - name: Test SSH Connection
      run: |
        ssh -p 21098 -o StrictHostKeyChecking=no abduksto@premium304.web-hosting.com "echo 'SSH connection successful'; exit"
    
    - name: Deploy to Server
      run: |
        rsync -avz --delete -e "ssh -p 21098 -o StrictHostKeyChecking=no" dist/ abduksto@premium304.web-hosting.com:/home/abduksto/socialmelo.com/